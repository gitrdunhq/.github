<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <rect width="1200" height="320" fill="#111111"/>

  <!-- Bauhaus geometric accents -->
  <!-- Red triangle (top-right) -->
  <polygon points="1060,0 1200,280 920,280" fill="#E63946" opacity="0.85"/>
  <!-- Yellow circle -->
  <circle cx="920" cy="60" r="40" fill="#F4A261" opacity="0.9"/>
  <!-- Blue rectangle (bottom-left) -->
  <rect x="0" y="240" width="200" height="80" fill="#1D3557"/>
  <!-- Yellow bar accent (left) -->
  <rect x="0" y="200" width="120" height="8" fill="#F4A261"/>
  <!-- Red dot cluster -->
  <circle cx="160" cy="220" r="6" fill="#E63946"/>
  <circle cx="180" cy="210" r="4" fill="#E63946" opacity="0.6"/>

  <!-- Label line -->
  <rect x="80" y="72" width="32" height="2" fill="#E63946"/>
  <text x="124" y="76" fill="#F4A261" font-family="monospace" font-size="11" letter-spacing="3" text-anchor="start">AGENTIC ENGINEERING</text>

  <!-- Main title -->
  <text x="80" y="140" fill="#F1FAEE" font-family="sans-serif" font-weight="900" font-size="56" letter-spacing="-1">GITRDUN</text>

  <!-- Subtitle -->
  <text x="82" y="180" fill="#F1FAEE" font-family="sans-serif" font-size="18" opacity="0.65">Building real infrastructure with AI as a force multiplier.</text>

  <!-- Bauhaus tri-color bar (bottom) -->
  <rect x="0" y="308" width="400" height="12" fill="#E63946"/>
  <rect x="400" y="308" width="400" height="12" fill="#F4A261"/>
  <rect x="800" y="308" width="400" height="12" fill="#1D3557"/>
</svg>
